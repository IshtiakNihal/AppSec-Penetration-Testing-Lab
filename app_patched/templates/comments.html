{% extends "base.html" %}
{% block content %}
<h2>Comments</h2>
<form method="POST">
    <textarea name="text"></textarea>
    <button type="submit">Post</button>
</form>
<div class="comment-list">
    {% for comment in comments %}
        <div class="comment">{{ comment.text }}</div>
    {% endfor %}
</div>
{% endblock %}
