version: "3.8"

services:
  web:
    build: .
    ports:
      - "5005:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=appsec_user
      - POSTGRES_PASSWORD=appsec_pass
      - POSTGRES_DB=appsec_lab
    ports:
      - "5434:5432"
    volumes:
      - appsec_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appsec_user -d appsec_lab"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  appsec_db:
