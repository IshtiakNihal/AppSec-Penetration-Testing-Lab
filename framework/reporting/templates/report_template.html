<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project C Summary</title>
    <style>
        body { font-family: "Georgia", serif; margin: 40px; }
        h1 { color: #1f2a44; }
        .finding { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Project C Findings Summary</h1>
    <p>Total findings: {{ findings|length }}</p>
    {% for finding in findings %}
        <div class="finding">
            <strong>{{ finding.id }}</strong> - {{ finding.severity }}
        </div>
    {% endfor %}
</body>
</html>
