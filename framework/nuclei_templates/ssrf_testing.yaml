id: ssrf-testing
info:
  name: SSRF Testing
  author: project-c
  severity: high
requests:
  - method: POST
    path:
      - "{{BaseURL}}/api/verify-payment"
    headers:
      Content-Type: application/json
    body: '{"webhook_url":"http://127.0.0.1:6379"}'
    matchers:
      - type: status
        status:
          - 200
